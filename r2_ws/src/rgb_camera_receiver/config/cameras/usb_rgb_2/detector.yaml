# 第二台 USB 摄像头候选参数。
calibrated: true
processing:
  scale: 0.4
color_assignment:
  exclusive_hue_owner: true
colors:
  RED:
    hue_center: 0.33
    hue_radius: 10.33
    min_saturation: 150.0
    min_value: 44.0
  GREEN:
    hue_center: 74.44
    hue_radius: 13.56
    min_saturation: 150.0
    min_value: 66.0
    channel_min:
      g: 0.505
    channel_max:
      b: 0.42
  BLUE:
    hue_center: 122.0
    hue_radius: 10.0
    min_saturation: 150.0
    min_value: 48.0
    channel_min:
      b: 0.62
    channel_max:
      g: 0.22
  PURPLE:
    hue_center: 149.27
    hue_radius: 22.0
    min_saturation: 91.0
    min_value: 71.0
dots:
  min_blob_area: 1
  max_blob_area: 300
  max_blob_aspect: 3.5
  min_blob_compactness: 0.05
  dog_sigma_small: 0.8
  dog_sigma_large: 2.6
  min_dog_response: 5.0
  max_points_per_color: 40
geometry:
  min_dots: 5
  max_dots: 6
  min_length_pixels: 28
  line_distance_pixels: 3.5
  max_gap_ratio: 3.2
  max_spacing_trend_error: 0.32
  min_coverage: 0.55
  min_valley_contrast: 0.05
  min_periodic_dot_quality: 0.38
  min_periodic_color_quality: 0.45
  continuous_min_area: 1000000
  continuous_min_length: 1000000
  continuous_min_aspect: 1000000
  continuous_min_color_quality: 1.0
  max_pair_hypotheses: 200
  max_line_hypotheses: 5
selection:
  min_score: 0.30
  winner_margin: 1.2
pairing:
  min_pair_score: 0.04
  max_angle_degrees: 18.0
  max_cross_distance_pixels: 35.0
  min_center_distance_ratio: 0.35
  max_center_distance_ratio: 3.0
  min_length_ratio: 0.35
  max_length_ratio: 2.8
  max_pairs: 20
