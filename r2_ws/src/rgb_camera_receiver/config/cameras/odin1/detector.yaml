# 起始模板：只能用于标定，不能用于检测。
# 采集 Odin1 数据后可修改全部颜色、几何参数，或替换 algorithm。
calibrated: false
algorithm: classical

colors:
  RED:    {chroma_center: [0.10, 0.30], chroma_covariance: [[0.01, 0.0], [0.0, 0.01]], max_distance: 3.0}
  GREEN:  {chroma_center: [0.20, 0.60], chroma_covariance: [[0.01, 0.0], [0.0, 0.01]], max_distance: 3.0}
  BLUE:   {chroma_center: [0.70, 0.20], chroma_covariance: [[0.01, 0.0], [0.0, 0.01]], max_distance: 3.0}
  YELLOW: {chroma_center: [0.20, 0.40], chroma_covariance: [[0.01, 0.0], [0.0, 0.01]], max_distance: 3.0}
  PURPLE: {chroma_center: [0.45, 0.20], chroma_covariance: [[0.01, 0.0], [0.0, 0.01]], max_distance: 3.0}

color_classification:
  min_saturation: 55
  min_value: 50
  min_colored_fraction: 0.12
  min_color_support: 0.70
  min_class_margin: 1.25

dots:
  min_blob_area: 1
  max_blob_area: 300
  max_blob_aspect: 3.5
  min_blob_compactness: 0.05
  dog_sigma_small: 0.8
  dog_sigma_large: 2.6
  min_dog_response: 5.0
  max_points_per_color: 160

geometry:
  min_dots: 6
  min_length_pixels: 40
  line_distance_pixels: 3.5
  max_gap_ratio: 3.2
  max_spacing_trend_error: 0.32
  min_coverage: 0.55
  min_valley_contrast: 0.05
  min_periodic_dot_quality: 0.38
  min_periodic_color_quality: 0.45
  max_pair_hypotheses: 2000
  max_line_hypotheses: 20
  fallback_max_pair_hypotheses: 10000
  fallback_max_line_hypotheses: 40

selection:
  min_score: 0.04
  winner_margin: 1.20

pairing:
  min_pair_score: 0.04
  max_angle_degrees: 18.0
  max_cross_distance_pixels: 35.0
  min_center_distance_ratio: 0.35
  max_center_distance_ratio: 3.0
  min_length_ratio: 0.35
  max_length_ratio: 2.8
  max_pairs: 20
