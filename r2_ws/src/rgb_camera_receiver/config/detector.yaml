# R2 摄像头观测参数，特意与 R1 LED 的 RGB 输出值相互独立。
colors:
  RED:    {hue_center: 2,   hue_radius: 13, min_saturation: 100, min_value: 65}
  GREEN:  {hue_center: 74,  hue_radius: 10, min_saturation: 90,  min_value: 55}
  CYAN:   {hue_center: 84,  hue_radius: 9,  min_saturation: 85,  min_value: 55}
  BLUE:   {hue_center: 120, hue_radius: 15, min_saturation: 90,  min_value: 55}
  PURPLE: {hue_center: 147, hue_radius: 14, min_saturation: 80,  min_value: 55}

# 物理 LED 表现为紧凑的局部亮点。以下参数用于排除白色顶灯产生的长条彩色边缘。
dots:
  min_blob_area: 1
  max_blob_area: 300
  max_blob_aspect: 3.5
  min_blob_compactness: 0.05
  dog_sigma_small: 0.8
  dog_sigma_large: 2.6
  min_dog_response: 5.0
  max_points_per_color: 160

geometry:
  min_dots: 6
  min_length_pixels: 40
  line_distance_pixels: 3.5
  max_gap_ratio: 3.2
  # 受透视影响，点间距可能保持不变，也可能近似线性增大或减小。
  # 此参数是相对于该线性趋势的归一化残差。
  max_spacing_trend_error: 0.32
  min_coverage: 0.55
  min_valley_contrast: 0.05
  # 微弱反光和顶灯彩色边缘无法通过这些逐灯珠检查。
  min_periodic_dot_quality: 0.38
  min_periodic_color_quality: 0.45
  # 当距离或曝光导致灯珠连成一体时，只接受细长且高饱和的连通区域。
  # 短发光条不视为 LED 灯带。
  continuous_min_area: 30
  continuous_min_length: 80
  continuous_min_aspect: 8.0
  continuous_min_color_quality: 0.75
  max_pair_hypotheses: 2000
  max_line_hypotheses: 20

selection:
  min_score: 0.04
  winner_margin: 1.20

# 将两段独立检测到的单色灯带配对为一条共享协议命令。
# 协议表本身位于 shared/rgb_comm_protocol。
pairing:
  min_pair_score: 0.04
  max_angle_degrees: 18.0
  max_cross_distance_pixels: 35.0
  min_center_distance_ratio: 0.35
  max_center_distance_ratio: 3.0
  min_length_ratio: 0.35
  max_length_ratio: 2.8
  max_pairs: 20
