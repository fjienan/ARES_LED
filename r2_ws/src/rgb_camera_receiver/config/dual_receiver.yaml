# 双 USB 摄像头接收配置。
#
# 不要在这里使用 auto。先用下面命令查稳定设备名：
#   v4l2-ctl --list-devices
#   ls -l /dev/v4l/by-id/
#   ls -l /dev/v4l/by-path/
#
# 如果两台摄像头型号/序列号相同，/dev/v4l/by-id/ 可能不够区分，
# 优先使用 /dev/v4l/by-path/ 中和 USB 口绑定的路径。
camera_slots:
  camera_1:
    enabled: true
    profile: usb_rgb_1
    device: /dev/v4l/by-path/pci-0000:05:00.3-usb-0:2:1.0-video-index0
    required: false
    frame_width: 2560
    frame_height: 1440
    camera_fps: 30.0
    scan_rate_hz: 30.0
    camera_fourcc: MJPG
    camera_buffer_size: 1
    show_preview: true
    preview_scale: 0.45
    processing_scale: 0.0
    save_positive_images: true
    positive_capture_dir: ~/Desktop/LED/camera_capture_results/positive_usb_rgb_1_combined
    positive_save_interval_sec: 1.0

  camera_2:
    enabled: true
    profile: usb_rgb_2
    device: /dev/v4l/by-path/pci-0000:05:00.4-usb-0:2:1.0-video-index0
    required: false
    camera_fps: 30.0
    scan_rate_hz: 20.0
    show_preview: true

arbiter:
  output_topic: /aruco_comm/rx_id
  reset_command_id: 0
